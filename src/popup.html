<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Routeva</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="popup-page">
    <main class="popup-shell">
      <header class="app-header">
        <div class="brand">
          <img src="../assets/icon-32.png?v=0.6.0" width="32" height="32" alt="" />
          <div>
            <strong>Routeva</strong>
            <span>VPN и прокси по вашим правилам</span>
          </div>
        </div>
        <button class="icon-button" id="openSettings" type="button" aria-label="Открыть настройки">Настройки</button>
      </header>

      <aside class="update-card hidden" id="updateCard">
        <span class="update-dot"></span>
        <div><strong id="updateText">Доступно обновление</strong><a id="updateLink" href="#" target="_blank" rel="noreferrer">Что нового</a></div>
        <button id="dismissUpdate" type="button" aria-label="Скрыть уведомление">×</button>
      </aside>

      <section class="server-deck" id="serverDeck" aria-label="Серверы. Листайте влево или вправо">
        <div class="server-track" id="serverTrack"></div>
        <button class="power-switch" id="masterToggle" type="button" role="switch" aria-checked="true">
          <span></span>
        </button>
      </section>
      <div class="server-pagination"><div class="server-dots" id="serverDots"></div><span id="serverPosition">1 из 1 · листайте карточку</span></div>

      <div class="route-mode" role="group" aria-label="Режим VPN">
        <button class="route-mode-button active" data-route-mode="selected" type="button" aria-pressed="true">По списку сайтов</button>
        <button class="route-mode-button" data-route-mode="all" type="button" aria-pressed="false">Весь интернет</button>
      </div>

      <section class="panel current-site" id="currentSitePanel">
        <div class="site-mark" id="siteMark">A</div>
        <div class="site-copy">
          <span>Текущий сайт</span>
          <strong id="currentHost">—</strong>
        </div>
        <button class="mini-toggle" id="siteToggle" type="button" role="switch" aria-checked="false"><span></span></button>
      </section>

      <section class="panel list-panel">
        <div class="list-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4.75h10A2.25 2.25 0 0 1 19.25 7v10A2.25 2.25 0 0 1 17 19.25H7A2.25 2.25 0 0 1 4.75 17V7A2.25 2.25 0 0 1 7 4.75Zm2.1 4.1a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm2.1-.75a.75.75 0 0 0 0 1.5h5.2a.75.75 0 0 0 0-1.5h-5.2Zm-2.1 3.9a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm2.1-.75a.75.75 0 0 0 0 1.5h5.2a.75.75 0 0 0 0-1.5h-5.2Zm-2.1 3.9a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm2.1-.75a.75.75 0 0 0 0 1.5h5.2a.75.75 0 0 0 0-1.5h-5.2Z"/></svg>
        </div>
        <div class="site-copy">
          <span>Готовый список</span>
          <strong id="communityLabel">Сайты для России</strong>
        </div>
        <button class="mini-toggle" id="communityToggle" type="button" role="switch" aria-checked="true"><span></span></button>
      </section>

      <p class="notice hidden" id="notice" role="status"></p>
      <footer id="routeFooter"><span class="privacy-dot"></span> Остальные сайты подключаются напрямую</footer>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
