<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Routeva</title>
    <link rel="stylesheet" href="ui.css?v=0.8.0-r1" />
  </head>
  <body class="popup-page">
    <main class="popup-shell">
      <header class="app-header">
        <div class="brand">
          <img src="../assets/icon-32.png?v=0.8.0" width="32" height="32" alt="" />
          <div>
            <strong>Routeva</strong>
            <span>Ваш интернет — по вашим правилам</span>
          </div>
        </div>
        <button class="icon-button" id="openSettings" type="button">
          <img src="../assets/icons/gear.svg" width="16" height="16" alt="" />
          <span>Настройки</span>
        </button>
      </header>

      <aside class="update-card hidden" id="updateCard">
        <span class="update-dot"></span>
        <div><strong id="updateText">Доступно обновление</strong><a id="updateLink" href="#" target="_blank" rel="noreferrer">Что нового</a></div>
        <button id="dismissUpdate" type="button" aria-label="Скрыть уведомление">×</button>
      </aside>

      <section class="server-deck" id="serverDeck" aria-label="Выбранный сервер">
        <div class="server-track" id="serverTrack"></div>
        <button class="power-switch" id="masterToggle" type="button" role="switch" aria-checked="true" aria-label="Включить или выключить VPN">
          <span></span>
        </button>
      </section>

      <section class="server-controls" aria-label="Выбор сервера">
        <nav class="server-pagination" aria-label="Переключение серверов">
          <button class="server-arrow" id="serverPrev" type="button" aria-label="Предыдущий сервер">
            <img src="../assets/icons/caret-left.svg" width="16" height="16" alt="" />
          </button>
          <span id="serverPosition" aria-live="polite">1 из 1</span>
          <button class="server-arrow" id="serverNext" type="button" aria-label="Следующий сервер">
            <img src="../assets/icons/caret-right.svg" width="16" height="16" alt="" />
          </button>
        </nav>
        <div class="server-search" id="serverSearch">
          <label class="server-search-field" for="serverSearchInput">
            <img src="../assets/icons/magnifying-glass.svg" width="16" height="16" alt="" />
            <input id="serverSearchInput" type="search" placeholder="Найти сервер" autocomplete="off" spellcheck="false" aria-label="Найти сервер или страну" />
            <button class="server-search-clear hidden" id="serverSearchClear" type="button" aria-label="Очистить поиск">
              <img src="../assets/icons/x.svg" width="14" height="14" alt="" />
            </button>
          </label>
          <div class="server-search-results hidden" id="serverSearchResults" role="listbox" aria-label="Результаты поиска серверов"></div>
        </div>
      </section>

      <div class="route-mode" role="group" aria-label="Режим VPN">
        <button class="route-mode-button active" data-route-mode="selected" type="button" aria-pressed="true">По списку сайтов</button>
        <button class="route-mode-button" data-route-mode="all" type="button" aria-pressed="false">Весь интернет</button>
      </div>

      <section class="panel current-site" id="currentSitePanel">
        <div class="site-mark" id="siteMark">A</div>
        <div class="site-copy">
          <span>Текущий сайт</span>
          <strong id="currentHost">—</strong>
        </div>
        <button class="mini-toggle" id="siteToggle" type="button" role="switch" aria-checked="false" aria-label="Направлять текущий сайт через VPN"><span></span></button>
      </section>

      <section class="panel list-panel">
        <div class="list-icon">
          <img src="../assets/icons/database.svg" width="20" height="20" alt="" />
        </div>
        <div class="site-copy">
          <span>Автоматический список</span>
          <strong id="communityLabel">Сайты для России</strong>
        </div>
        <button class="mini-toggle" id="communityToggle" type="button" role="switch" aria-checked="true" aria-label="Использовать автоматический список"><span></span></button>
      </section>

      <p class="notice hidden" id="notice" role="status"></p>
      <footer id="routeFooter"><span class="privacy-dot"></span> Остальные сайты подключаются напрямую</footer>
    </main>
    <script type="module" src="popup.js?v=0.8.0-r2"></script>
  </body>
</html>
